<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F4F7;
  --sidebar:#FFFFFF;
  --content:#F5F7FA;
  --card:#FFFFFF;
  --border:#E5E8ED;
  --border2:#D0D5DD;
  --text:#1A1A2E;
  --muted:#6B7A8D;
  --dim:#9DAAB8;
  --teal:#2FC6F6;
  --teal-dark:#1AA8D8;
  --teal-light:rgba(47,198,246,.12);
  --r:10px;--r-sm:7px;--r-xs:5px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
}
html,body{height:100%;margin:0;font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;color:var(--text);overflow:hidden}
body{background:var(--bg);display:flex}

/* ── DRAWER ── */
.drawer{display:flex;width:100%;height:100%}

/* ── SIDEBAR ── */
.sidebar{width:240px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%}
.sidebar-hd{padding:18px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.sidebar-top-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:10px}
.search-wrap{position:relative}
.search-inp{width:100%;background:var(--content);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px 7px 32px;font-family:'Inter',sans-serif;font-size:.82rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.search-inp::placeholder{color:var(--dim)}
.search-inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-light)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}

/* entity chips */
.entity-filter{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px 8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.entity-chip{font-size:.74rem;font-weight:500;padding:3px 9px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--content);cursor:pointer;transition:background .12s,color .12s,border-color .12s;user-select:none}
.entity-chip:hover{border-color:var(--teal);color:var(--teal-dark)}
.entity-chip.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}

.sidebar-nav{flex:1;overflow-y:auto;padding:6px 8px 20px}

/* nav items */
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:.84rem;font-weight:500;color:var(--muted);transition:background .12s,color .12s;user-select:none}
.nav-item:hover{background:var(--content);color:var(--text)}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600}
.nav-item.active .ni-icon{color:#fff}
.ni-icon{color:var(--dim);flex-shrink:0;display:flex;align-items:center;transition:color .12s}
.ni-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CONTENT ── */
.content{flex:1;min-width:0;background:var(--content);display:flex;flex-direction:column;height:100%;overflow:hidden}
.content-hd{padding:24px 32px 18px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.content-title{font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.02em}
.content-sub{font-size:.85rem;color:var(--muted);line-height:1.55;max-width:600px}
.content-body{flex:1;overflow-y:auto;padding:20px 32px 40px}

/* ── ACCORDION CARD (like B24 "Профиль сотрудника / Приглашения") ── */
.acc-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.acc-head{display:flex;align-items:center;gap:12px;padding:15px 20px;cursor:pointer;user-select:none;transition:background .12s}
.acc-head:hover{background:#FAFBFC}
.acc-icon{color:var(--dim);flex-shrink:0;display:flex;align-items:center}
.acc-title{flex:1;font-size:.96rem;font-weight:500;color:var(--text)}
.acc-chev{color:var(--dim);transition:transform .2s ease;flex-shrink:0}
.acc-card.open>.acc-head .acc-chev{transform:rotate(180deg)}
.acc-body{display:none;border-top:1px solid var(--border)}
.acc-card.open>.acc-body{display:block}

/* ── SETTING ROW ── */
.setting-row{display:flex;align-items:flex-start;gap:14px;padding:13px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.setting-row:last-child{border-bottom:none}
.setting-row:hover{background:#FAFBFC}
.setting-row.hidden{display:none}
.s-ctrl{flex-shrink:0;padding-top:1px}
.s-text{flex:1;min-width:0}
.s-title{font-size:.88rem;font-weight:500;color:var(--text);line-height:1.4}
.s-name{font-size:.68rem;color:var(--dim);font-family:monospace;margin-top:2px}
.s-note{font-size:.74rem;color:var(--muted);margin-top:3px;font-style:italic}
.s-desc{font-size:.79rem;color:var(--muted);margin-top:3px;line-height:1.45}
.cond-badge{display:inline-block;font-size:.64rem;font-weight:600;padding:1px 6px;border-radius:99px;background:#FEF3CD;color:#92620A;border:1px solid rgba(146,98,10,.2);margin-left:6px;vertical-align:middle;white-space:nowrap}

/* non-toggle controls placed below title */
.ctrl-sel,.ctrl-txt,.ctrl-ta{margin-top:6px;background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xs);color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;padding:6px 10px;outline:none;transition:border-color .15s;display:block}
.ctrl-sel{cursor:pointer;max-width:220px}
.ctrl-txt{width:220px}
.ctrl-ta{width:220px;min-height:60px;resize:vertical}
.ctrl-sel:focus,.ctrl-txt:focus,.ctrl-ta:focus{border-color:var(--teal)}
.ctrl-ro-badge{display:inline-block;font-size:.63rem;font-weight:600;background:var(--content);border:1px solid var(--border);color:var(--dim);border-radius:99px;padding:1px 7px;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* ── B24 TOGGLE ── */
.b24-tog{display:inline-flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.b24-tog input{display:none}
.b24-pill{font-size:.62rem;font-weight:700;letter-spacing:.04em;padding:2px 5px;border-radius:99px;user-select:none;transition:background .18s,color .18s;flex-shrink:0}
.b24-pill.on{background:var(--teal);color:#fff}
.b24-pill.off{background:#DDE3EC;color:var(--muted)}
.b24-track{width:32px;height:17px;border-radius:99px;position:relative;transition:background .18s;flex-shrink:0}
.b24-track.on{background:var(--teal)}
.b24-track.off{background:#DDE3EC}
.b24-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.b24-track.on .b24-thumb{left:17px}

.link-row{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.link-row:last-child{border-bottom:none}
.link-row:hover{background:#FAFBFC}
.link-icon{color:var(--dim);flex-shrink:0;display:flex;padding-top:2px}
.link-info{flex:1;min-width:0}
.link-title{font-size:.87rem;font-weight:500;color:var(--text);display:block}
.link-desc{font-size:.78rem;color:var(--muted);margin-top:2px;line-height:1.4}
.goto-btn{font-size:.78rem;font-weight:500;color:var(--teal-dark);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;flex-shrink:0;transition:color .12s;padding-top:2px}
.goto-btn:hover{color:var(--teal)}

/* ── MATRIX ── */
.matrix-row-ui{display:flex;align-items:center;gap:14px;padding:14px 20px}
.matrix-title{flex:1;font-size:.87rem;font-weight:500;color:var(--text)}
.matrix-btn{background:#E6F9FF;border:1px solid var(--teal);border-radius:var(--r-xs);color:var(--teal-dark);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;padding:5px 14px;cursor:pointer;transition:background .14s,color .14s}
.matrix-btn:hover{background:var(--teal);color:#fff}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:60px 0;color:var(--dim);font-size:.9rem}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(20,25,40,.4);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:var(--r);width:480px;max-width:calc(100vw - 32px);max-height:78vh;display:flex;flex-direction:column;box-shadow:var(--shadow-md);transform:translateY(12px);transition:transform .22s;overflow:hidden}
.overlay.show .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:.95rem;font-weight:700;color:var(--text)}
.modal-x{background:none;border:1px solid var(--border);border-radius:var(--r-xs);color:var(--muted);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:background .12s}
.modal-x:hover{background:var(--content)}
.modal-body{overflow-y:auto;flex:1}
.modal-row{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.modal-row:last-child{border-bottom:none}
.modal-row:hover{background:var(--content)}
.modal-lbl{font-size:.85rem;font-weight:500;color:var(--text);flex:1}
.modal-key{font-size:.67rem;font-family:monospace;color:var(--dim)}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;flex-shrink:0}
.modal-done{background:var(--teal);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;padding:8px 24px;cursor:pointer;transition:background .14s}
.modal-done:hover{background:var(--teal-dark)}

/* ── TOAST ── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:var(--r-sm);padding:9px 13px;min-width:200px;max-width:280px;box-shadow:var(--shadow-md);animation:tIn .2s ease forwards}
.toast.out{animation:tOut .2s ease forwards}
.toast-title{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:1px}
.toast-url{font-size:.69rem;color:var(--dim);font-family:monospace;word-break:break-all}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>

<div class="toasts" id="toasts"></div>

<div class="overlay" id="matrixOverlay">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="matrixTitle">Матрица</span>
      <button class="modal-x" id="matrixClose">✕</button>
    </div>
    <div class="modal-body" id="matrixBody"></div>
    <div class="modal-ft"><button class="modal-done" id="matrixDone">Готово</button></div>
  </div>
</div>

<div class="drawer">
  <aside class="sidebar">
    <div class="sidebar-hd">
      <div class="sidebar-top-title">Настройки CRM</div>
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-inp" id="searchInp" type="text" placeholder="Поиск…">
      </div>
    </div>
    <div class="entity-filter" id="entityFilter"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <div class="content">
    <div class="content-hd">
      <div class="content-title" id="contentTitle">Выберите раздел</div>
      <div class="content-sub" id="contentSub"></div>
    </div>
    <div class="content-body" id="contentBody">
      <div class="empty-state">Выберите сценарий в меню слева</div>
    </div>
  </div>
</div>

<script>
/* ══ DATA ══ */
const SCENARIOS = [
  {id:"start_from_scratch", short:"С нуля", title:"Запустить CRM с нуля", subtitle:"Базовые данные, воронки и реквизиты, чтобы CRM стала рабочей.", icon:"rocket", linksTitle:"Базовая конфигурация",
   steps:[
    {id:"directories",type:"link",title:"Справочники",desc:"Статусы, источники, типы и другие системные справочники CRM",href:"/crm/configs/status/"},
    {id:"currencies",type:"link",title:"Валюты",desc:"Настройка валют и курсов для сделок и счетов",href:"/crm/configs/currency/"},
    {id:"locations",type:"link",title:"Местоположения",desc:"Справочник стран, регионов и городов",href:"/crm/configs/locations/"},
    {id:"taxes",type:"link",title:"Налоги",desc:"Налоговые ставки, применяемые к товарам и услугам",href:"/crm/configs/tax/"},
    {id:"measures",type:"link",title:"Единицы измерения",desc:"Единицы измерения для товаров в каталоге",href:"/crm/configs/measure/"},
    {id:"requisites_templates",type:"link",title:"Шаблоны реквизитов",desc:"Шаблоны для заполнения реквизитов клиентов и компаний",href:"/crm/configs/preset/"},
    {id:"my_companies_requisites",type:"link",title:"Реквизиты ваших компаний",desc:"Банковские и юридические реквизиты вашей организации",href:"/crm/configs/mycompany/"},
    {id:"pipelines",type:"link",title:"Воронки продаж",desc:"Этапы и воронки для сделок, настройка стадий",href:"/crm/configs/deal_category/"}
  ]},
  {id:"data_structure", short:"Структура данных", title:"Настроить структуру данных", subtitle:"Поля, свойства и аналитика под ваш бизнес.", icon:"layers", linksTitle:"Поля и аналитика",
   steps:[
    {id:"user_fields",type:"link",title:"Пользовательские поля",desc:"Добавление и настройка дополнительных полей для сущностей CRM",href:"/crm/configs/fields/"},
    {id:"product_props",type:"link",title:"Свойства товаров",desc:"Характеристики и атрибуты товаров в каталоге",href:"/crm/configs/productprops/"},
    {id:"analytics_reports",type:"link",title:"Аналитические отчёты",desc:"Виджеты и отчёты для анализа продаж и эффективности",href:"/crm/configs/widget/"}
  ]},
  {id:"ui_and_behavior", short:"Интерфейс", title:"Интерфейс и поведение CRM", subtitle:"Карточки, дефолтные виды, доступность сущностей, уведомления.", icon:"layout",
   steps:[
    {id:"general_display_settings",type:"settings_group",title:"Отображение и дефолты",settings:[
      {id:"ENABLE_SLIDER",type:"toggle",title:"Включить новую карточку CRM",desc:"Открывать карточку лида, сделки и контакта в новом слайдере вместо отдельной страницы",name:"ENABLE_SLIDER"},
      {id:"ENABLE_USER_NAME_SORTING",type:"toggle",title:"Включить сортировку по имени пользователя",desc:"Сортировать ответственных по имени, а не по идентификатору",name:"ENABLE_USER_NAME_SORTING"},
      {id:"LEAD_OPENED",type:"toggle",title:"Лиды: доступен для всех (по умолчанию)",desc:"Новые сотрудники получают доступ к разделу «Лиды» по умолчанию",name:"LEAD_OPENED"},
      {id:"LEAD_DEFAULT_LIST_VIEW",type:"select",title:"Лиды: вид списка (по умолчанию)",desc:"Какой вид открывается при переходе в раздел лидов",name:"LEAD_DEFAULT_LIST_VIEW",options:[{value:"1",label:"Список"},{value:"3",label:"Канбан лидов"}]},
      {id:"CONTACT_OPENED",type:"toggle",title:"Контакты: доступен для всех (по умолчанию)",desc:"Новые сотрудники получают доступ к разделу «Контакты» по умолчанию",name:"CONTACT_OPENED"},
      {id:"CONTACT_DEFAULT_LIST_VIEW",type:"select",title:"Контакты: вид списка (по умолчанию)",desc:"Какой вид открывается при переходе в раздел контактов",name:"CONTACT_DEFAULT_LIST_VIEW",options:[{value:"1",label:"Список"}]},
      {id:"COMPANY_OPENED",type:"toggle",title:"Компании: доступна для всех (по умолчанию)",desc:"Новые сотрудники получают доступ к разделу «Компании» по умолчанию",name:"COMPANY_OPENED"},
      {id:"COMPANY_DEFAULT_LIST_VIEW",type:"select",title:"Компании: вид списка (по умолчанию)",desc:"Какой вид открывается при переходе в раздел компаний",name:"COMPANY_DEFAULT_LIST_VIEW",options:[{value:"1",label:"Список"}]},
      {id:"DEAL_OPENED",type:"toggle",title:"Сделки: доступна для всех (по умолчанию)",desc:"Новые сотрудники получают доступ к разделу «Сделки» по умолчанию",name:"DEAL_OPENED"},
      {id:"DEAL_DEFAULT_LIST_VIEW",type:"select",title:"Сделки: вид списка (по умолчанию)",desc:"Какой вид открывается при переходе в раздел сделок",name:"DEAL_DEFAULT_LIST_VIEW",options:[{value:"1",label:"Список"},{value:"3",label:"Канбан сделок"}]},
      {id:"REFRESH_DEAL_CLOSEDATE",type:"toggle",title:"Сделки: обновлять дату завершения при переходе в финальную стадию",desc:"Автоматически проставлять текущую дату при переводе сделки в успешную или провальную стадию",name:"REFRESH_DEAL_CLOSEDATE"},
      {id:"INVOICE_DEFAULT_LIST_VIEW",type:"select",title:"Счета: вид списка (по умолчанию)",desc:"Какой вид открывается при переходе в раздел счетов",name:"INVOICE_DEFAULT_LIST_VIEW",options:[{value:"1",label:"Список"},{value:"3",label:"Канбан счетов"}]},
      {id:"QUOTE_OPENED",type:"toggle",title:"Предложения: доступно для всех (по умолчанию)",desc:"Новые сотрудники получают доступ к разделу «Предложения» по умолчанию",name:"QUOTE_OPENED"},
      {id:"NOTIFICATIONS_SENDER",type:"select",title:"Нотификации для клиентов",desc:"Канал отправки автоматических уведомлений клиентам из CRM",name:"NOTIFICATIONS_SENDER",options:[{value:"auto",label:"Автоматический выбор"},{value:"bitrix24",label:"Битрикс24"},{value:"sms_provider",label:"СМС провайдер"}]}
    ]}
  ]},
  {id:"automation", short:"Автоматизация", title:"Автоматизировать продажи", subtitle:"Роботы, бизнес-процессы и автосценарии (включая повторные продажи).", icon:"zap", linksTitle:"Роботы и бизнес-процессы",
   steps:[
    {id:"bizproc",type:"link",title:"Бизнес-процессы",desc:"Настройка бизнес-процессов, привязанных к элементам CRM",href:"/crm/configs/bp/"},
    {id:"lead_automation",type:"link",title:"Роботы: Лиды",desc:"Автоматические действия по триггерам на стадиях лидов",href:"/crm/lead/automation/0/"},
    {id:"deal_automation",type:"link",title:"Роботы: Сделки",desc:"Автоматические действия по триггерам на стадиях сделок",href:"/crm/deal/automation/0/"},
    {id:"conversion_and_repeat_sales",type:"settings_group",title:"Автосоздание и повторные продажи",settings:[
      {id:"CONVERSION_ENABLE_AUTOCREATION",type:"toggle",title:"Создавать элементы при конвертации без участия пользователя",desc:"При конвертации лида система автоматически создаст сделку, контакт и компанию без подтверждения менеджера",name:"CONVERSION_ENABLE_AUTOCREATION"},
      {id:"AUTO_GEN_RC",type:"toggle",title:"Включить автоматическую регистрацию повторных продаж",desc:"При обращении существующего клиента система автоматически создаст повторный лид или сделку",name:"AUTO_GEN_RC"},
      {id:"AUTO_USING_FINISHED_LEAD",type:"toggle",title:"Включить устаревший сценарий создания лидов",desc:"Использовать старый механизм создания лидов при повторных продажах (не рекомендуется)",name:"AUTO_USING_FINISHED_LEAD",visibility:{when:[{settingId:"AUTO_GEN_RC",operator:"equals",value:false}]}}
    ]}
  ]},
  {id:"activities_calendar", short:"Дела и календарь", title:"Дела и календарь", subtitle:"Счётчики, календарь, переносы ответственных и автозакрытие дел при конвертации.", icon:"calendar",

function svgEl(name){ const d=document.createElement('span'); d.innerHTML=IC[name]||''; return d; }

/* ══ STATE ══ */
let svs={}, activeEnt='all', q='';

/* ══ LS ══ */
function lsg(k){ try{ const v=localStorage.getItem('crm3_'+k); return v===null?undefined:JSON.parse(v); }catch{ return undefined; } }
function lss(k,v){ try{ localStorage.setItem('crm3_'+k,JSON.stringify(v)); }catch{} }

function initState(){
  SCENARIOS.forEach(sc=>sc.steps.forEach(step=>{
    if(step.type==='settings_group'&&step.settings) step.settings.forEach(s=>{
      if(svs[s.name]===undefined){ const v=lsg('s_'+s.name); svs[s.name]=v!==undefined?v:(s.type==='toggle'?false:(s.options?s.options[0].value:'')); }
    });
    if(step.type==='matrix'&&step.items) step.items.forEach(i=>{
      if(svs[i.name]===undefined){ const v=lsg('s_'+i.name); svs[i.name]=v!==undefined?v:false; }
    });
  }));
}
function setV(n,v){ svs[n]=v; lss('s_'+n,v); }
function getV(n){ return svs[n]; }

function checkVis(vis){
  if(!vis||!vis.when) return true;
  return vis.when.every(c=>{
    const cur=getV(c.settingId);
    return c.operator==='equals'?(typeof c.value==='boolean'?cur===c.value:String(cur)===String(c.value)):true;
  });
}

/* ══ ENTITY MATCH ══ */
function mEnt(name,ent){
  if(!name||ent==='all') return true;
  return ENT_PREFIXES[ent].some(p=>name.toUpperCase().includes(p));
}
function stepME(step,ent){
  if(ent==='all') return true;
  if(step.type==='settings_group'&&step.settings) return step.settings.some(s=>mEnt(s.name,ent));
  if(step.type==='matrix'&&step.items) return step.items.some(s=>mEnt(s.name,ent));
  if(step.type==='link') return mEnt(step.href||'',ent);
  return false;
}
function scME(sc,ent){ return ent==='all'||sc.steps.some(s=>stepME(s,ent)); }
function scMS(sc,q){
  if(!q) return true;
  const l=q.toLowerCase();
  if(sc.title.toLowerCase().includes(l)||sc.short.toLowerCase().includes(l)) return true;
  return sc.steps.some(step=>{
    if(step.title&&step.title.toLowerCase().includes(l)) return true;
    if(step.type==='settings_group'&&step.settings) return step.settings.some(s=>s.title.toLowerCase().includes(l)||s.name.toLowerCase().includes(l));
    if(step.type==='matrix'&&step.items) return step.items.some(i=>i.title.toLowerCase().includes(l));
    return false;
  });
}

/* ══ TOAST ══ */
function toast(title,url){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<div class="toast-title">${esc(title)}</div>${url?`<div class="toast-url">${esc(url)}</div>`:''}`;
  c.appendChild(t); setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),220); },2800);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══ B24 TOGGLE ══ */
function buildToggle(name, onChange){
  const wrap=document.createElement('label'); wrap.className='b24-tog';
  const inp=document.createElement('input'); inp.type='checkbox'; inp.checked=!!getV(name);
  const pill=document.createElement('span'); pill.className='b24-pill '+(inp.checked?'on':'off'); pill.textContent=inp.checked?'ВКЛ':'ВЫКЛ';
  const track=document.createElement('div'); track.className='b24-track '+(inp.checked?'on':'off');
  const thumb=document.createElement('div'); thumb.className='b24-thumb'; track.append(thumb);
  inp.addEventListener('change',()=>{
    setV(name,inp.checked);
    pill.className='b24-pill '+(inp.checked?'on':'off'); pill.textContent=inp.checked?'ВКЛ':'ВЫКЛ';
    track.className='b24-track '+(inp.checked?'on':'off');
    if(onChange) onChange();
  });
  wrap.append(inp,pill,track); return wrap;
}

/* ══ SETTING ROW ══ */
function buildSRow(setting, container){
  const row=document.createElement('div');
  row.className='setting-row'+(setting.visibility&&!checkVis(setting.visibility)?' hidden':'');
  if(setting.visibility) row.dataset.vis=JSON.stringify(setting.visibility);

  const refVis=()=>{
    if(container) container.querySelectorAll('.setting-row[data-vis]').forEach(r=>r.classList.toggle('hidden',!checkVis(JSON.parse(r.dataset.vis))));
  };

  const ctrl=document.createElement('div'); ctrl.className='s-ctrl';
  if(setting.type==='toggle') ctrl.append(buildToggle(setting.name, refVis));
  else ctrl.style.display='none';

  const txt=document.createElement('div'); txt.className='s-text';
  const titleEl=document.createElement('div'); titleEl.className='s-title'; titleEl.textContent=setting.title;
  if(setting.visibility){
    const c=setting.visibility.when[0];
    const badge=document.createElement('span'); badge.className='cond-badge';
    badge.textContent='если '+c.settingId+'='+(c.value===true?'вкл':c.value===false?'выкл':c.value);
    titleEl.append(badge);
  }
  txt.append(titleEl);
  if(setting.desc){ const d=document.createElement('div'); d.className='s-desc'; d.textContent=setting.desc; txt.append(d); }
  const nameEl=document.createElement('div'); nameEl.className='s-name'; nameEl.textContent=setting.name;
  txt.append(nameEl);
  if(setting.note){ const n=document.createElement('div'); n.className='s-note'; n.textContent=setting.note; txt.append(n); }

  if(setting.type==='select'){
    const sel=document.createElement('select'); sel.className='ctrl-sel';
    setting.options.forEach(o=>{ const op=document.createElement('option'); op.value=o.value; op.textContent=o.label; sel.append(op); });
    const cur=getV(setting.name); if(cur!==undefined&&cur!==false) sel.value=String(cur);
    sel.addEventListener('change',()=>{ setV(setting.name,sel.value); refVis(); });
    txt.append(sel);
  } else if(setting.type==='text'){
    const inp=document.createElement('input'); inp.type='text'; inp.className='ctrl-txt';
    const v=getV(setting.name); inp.value=(v&&v!==false)?v:'';
    inp.addEventListener('input',()=>setV(setting.name,inp.value));
    txt.append(inp);
  } else if(setting.type==='textarea'){
    const ta=document.createElement('textarea'); ta.className='ctrl-ta';
    const v=getV(setting.name); ta.value=(v&&v!==false)?v:'';
    ta.addEventListener('input',()=>setV(setting.name,ta.value));
    txt.append(ta);
  } else if(setting.type==='readonly'){
    const badge=document.createElement('div'); badge.className='ctrl-ro-badge'; badge.textContent='read-only';
    txt.append(badge);
  }

  row.append(ctrl,txt); return row;
}

/* ══ ACCORDION ══ */
function buildAcc(title, iconName, bodyFn, startOpen){
  const card=document.createElement('div'); card.className='acc-card'+(startOpen?' open':'');
  const head=document.createElement('div'); head.className='acc-head';
  const ic=document.createElement('span'); ic.className='acc-icon'; ic.innerHTML=IC[iconName]||IC.gear;
  const t=document.createElement('span'); t.className='acc-title'; t.textContent=title;
  const ch=document.createElement('span'); ch.className='acc-chev'; ch.innerHTML=IC.chev;
  head.append(ic,t,ch);
  const body=document.createElement('div'); body.className='acc-body';
  bodyFn(body);
  head.addEventListener('click',()=>card.classList.toggle('open'));
  card.append(head,body); return card;
}

/* ══ MATRIX ══ */
function openMatrix(step){
  document.getElementById('matrixTitle').textContent=step.title;
  const body=document.getElementById('matrixBody'); body.innerHTML='';
  step.items.forEach(item=>{
    const row=document.createElement('div'); row.className='modal-row';
    row.append(buildToggle(item.name));
    const lbl=document.createElement('span'); lbl.className='modal-lbl'; lbl.textContent=item.title;
    const key=document.createElement('span'); key.className='modal-key'; key.textContent=item.name;
    row.append(lbl,key); body.append(row);
  });
  document.getElementById('matrixOverlay').classList.add('show');
}
document.getElementById('matrixClose').addEventListener('click',()=>document.getElementById('matrixOverlay').classList.remove('show'));
document.getElementById('matrixDone').addEventListener('click',()=>document.getElementById('matrixOverlay').classList.remove('show'));
document.getElementById('matrixOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('show'); });

/* ══ RENDER SIDEBAR ══ */
function renderSidebar(){
  // entity chips
  const ef=document.getElementById('entityFilter'); ef.innerHTML='';
  ENTITIES.forEach(e=>{
    const chip=document.createElement('div'); chip.className='entity-chip'+(activeEnt===e.id?' active':'');
    chip.textContent=e.label;
    chip.addEventListener('click',()=>{ activeEnt=e.id; renderSidebar(); renderContent(); });
    ef.append(chip);
  });
  // scenario nav — click scrolls right panel to that section
  const nav=document.getElementById('sidebarNav'); nav.innerHTML='';
  const ql=q.toLowerCase().trim();
  let any=false;
  SCENARIOS.forEach(sc=>{
    if(!scME(sc,activeEnt)) return;
    if(ql&&!scMS(sc,ql)) return;
    any=true;
    const item=document.createElement('div'); item.className='nav-item'; item.dataset.scId=sc.id;
    const ic=document.createElement('span'); ic.className='ni-icon'; ic.innerHTML=IC[sc.icon]||'';
    const lbl=document.createElement('span'); lbl.className='ni-label'; lbl.textContent=sc.short; lbl.title=sc.title;
    item.append(ic,lbl);
    item.addEventListener('click',()=>{
      const target=document.getElementById('sc-section-'+sc.id);
      if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
      // highlight
      document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
      item.classList.add('active');
    });
    nav.append(item);
  });
  if(!any){ const n=document.createElement('div'); n.style.cssText='padding:10px;font-size:.8rem;color:var(--dim)'; n.textContent='Нет разделов'; nav.append(n); }
}

/* ══ RENDER CONTENT — all matching scenarios ══ */
function renderContent(){
  const ql=q.toLowerCase().trim();
  const entLabel=ENTITIES.find(e=>e.id===activeEnt)?.label||'Все';
  document.getElementById('contentTitle').textContent=activeEnt==='all'?'Все настройки':entLabel;
  document.getElementById('contentSub').textContent='';
  const body=document.getElementById('contentBody'); body.innerHTML='';
  let anyVisible=false;

  SCENARIOS.forEach(sc=>{
    if(!scME(sc,activeEnt)) return;
    if(ql&&!scMS(sc,ql)) return;

    // collect visible steps
    const links=sc.steps.filter(s=>s.type==='link'&&(activeEnt==='all'||stepME(s,activeEnt)));
    const sgSteps=sc.steps.filter(s=>s.type==='settings_group'&&stepME(s,activeEnt)).map(step=>{
      const filtered=activeEnt==='all'?step.settings:step.settings.filter(s=>mEnt(s.name,activeEnt));
      return filtered.length?{...step,settings:filtered}:null;
    }).filter(Boolean);
    const matrices=sc.steps.filter(s=>s.type==='matrix');
    if(!links.length&&!sgSteps.length&&!matrices.length) return;
    anyVisible=true;

    // section wrapper with anchor id
    const section=document.createElement('div'); section.id='sc-section-'+sc.id; section.style.cssText='margin-bottom:28px';

    // scenario header
    const hd=document.createElement('div'); hd.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px';
    const hdIc=document.createElement('span'); hdIc.innerHTML=IC[sc.icon]||''; hdIc.style.cssText='color:var(--muted);display:flex';
    const hdTitle=document.createElement('div'); hdTitle.style.cssText='font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em';
    hdTitle.textContent=sc.title;
    hd.append(hdIc,hdTitle); section.append(hd);

    // links accordion
    if(links.length){
      section.append(buildAcc(sc.linksTitle||'Разделы и конфигурация','extlink', bdy=>{
        links.forEach(step=>{
          const row=document.createElement('div'); row.className='link-row';
          const ic=document.createElement('span'); ic.className='link-icon'; ic.innerHTML=IC.extlink;
          const info=document.createElement('div'); info.className='link-info';
          const title=document.createElement('span'); title.className='link-title'; title.textContent=step.title;
          info.append(title);
          if(step.desc){ const d=document.createElement('div'); d.className='link-desc'; d.textContent=step.desc; info.append(d); }
          const btn=document.createElement('button'); btn.className='goto-btn'; btn.textContent='Перейти';
          btn.addEventListener('click',e=>{ e.stopPropagation(); toast(step.title,step.href); });
          row.append(ic,info,btn); bdy.append(row);
        });
      }, true));
    }

    // settings_group accordions
    sgSteps.forEach(step=>{
      section.append(buildAcc(step.title,'gear', bdy=>{
        step.settings.forEach(s=>bdy.append(buildSRow(s,bdy)));
      }, true));
    });

    // matrix accordions
    matrices.forEach(step=>{
      section.append(buildAcc(step.title,'gear', bdy=>{
        if(step.desc){ const d=document.createElement('div'); d.style.cssText='padding:10px 20px 4px;font-size:.8rem;color:var(--muted);line-height:1.45'; d.textContent=step.desc; bdy.append(d); }
        const row=document.createElement('div'); row.className='matrix-row-ui';
        const mt=document.createElement('span'); mt.className='matrix-title'; mt.textContent='Настроить типы дел для автозакрытия';
        const btn=document.createElement('button'); btn.className='matrix-btn'; btn.textContent='Открыть матрицу';
        btn.addEventListener('click',()=>openMatrix(step));
        row.append(mt,btn); bdy.append(row);
      }, false));
    });

    body.append(section);
  });

  if(!anyVisible) body.innerHTML='<div class="empty-state">Ничего не найдено</div>';

  // sync active nav item on scroll
  syncNavOnScroll();
}

/* highlight nav item based on scroll position */
function syncNavOnScroll(){
  const bodyEl=document.getElementById('contentBody');
  bodyEl.onscroll=()=>{
    const sections=[...bodyEl.querySelectorAll('[id^="sc-section-"]')];
    let current=null;
    for(const sec of sections){
      if(sec.offsetTop-bodyEl.scrollTop<=60) current=sec.id.replace('sc-section-','');
    }
    document.querySelectorAll('.nav-item').forEach(item=>{
      item.classList.toggle('active', item.dataset.scId===current);
    });
  };
}

/* ══ SEARCH ══ */
document.getElementById('searchInp').addEventListener('input',e=>{
  q=e.target.value;
  renderSidebar(); renderContent();
});

/* ══ INIT ══ */
initState(); renderSidebar(); renderContent();
</script>
