<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сценарии настройки CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6FAFB;
  --card:#ffffff;
  --card-hover:#FAFCFD;
  --surface:#F0F4F6;
  --surface2:#E8EEF2;
  --border:#DDE5EC;
  --border-focus:#0075FF;
  --accent:#0075FF;
  --accent-hover:#005ED4;
  --accent-light:#EBF3FF;
  --accent-mid:rgba(0,117,255,.12);
  --text:#0D1117;
  --text-muted:#5C6A7A;
  --text-dim:#94A3B5;
  --green:#0B9E6E;
  --green-bg:#EDFAF4;
  --amber:#B45309;
  --amber-bg:#FEF3CD;
  --red:#C0392B;
  --r:12px;--r-sm:7px;--r-xs:5px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── LAYOUT ─── */
.shell{max-width:920px;margin:0 auto;padding:40px 20px 100px}

/* ─── HEADER ─── */
.page-hd{margin-bottom:28px}
.page-title{font-family:'Bricolage Grotesque',sans-serif;font-size:1.6rem;font-weight:800;
  letter-spacing:-.03em;color:var(--text);margin-bottom:6px}
.page-sub{font-size:.85rem;color:var(--text-muted)}

/* ─── CONTROLS ─── */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;flex-shrink:0}
.search-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:9px 12px 9px 34px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;
  outline:none;transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow)}
.search-inp::placeholder{color:var(--text-dim)}
.search-inp:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-mid)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  overflow:hidden;box-shadow:var(--shadow)}
.tab{background:none;border:none;color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.8rem;font-weight:600;padding:9px 15px;cursor:pointer;transition:background .14s,color .14s;
  white-space:nowrap;letter-spacing:.01em}
.tab:hover{background:var(--surface);color:var(--text)}
.tab.active{background:var(--accent);color:#fff}

/* ─── STATS ROW ─── */
.stats-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.stat-chip{font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:99px;border:1px solid transparent;letter-spacing:.02em}
.stat-chip.not-started{background:var(--surface);border-color:var(--border);color:var(--text-muted)}
.stat-chip.in-progress{background:var(--amber-bg);border-color:rgba(180,83,9,.2);color:var(--amber)}
.stat-chip.done{background:var(--green-bg);border-color:rgba(11,158,110,.2);color:var(--green)}

/* ─── LIST ─── */
.list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:60px 0;color:var(--text-dim);font-size:.9rem}

/* ─── SCENARIO CARD ─── */
.scenario{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow)}
.scenario.open{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-mid),var(--shadow)}

.sc-head{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;cursor:pointer;user-select:none;
  transition:background .12s}
.sc-head:hover{background:var(--card-hover)}

.sc-num{font-family:'Bricolage Grotesque',sans-serif;font-size:.75rem;font-weight:700;
  min-width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);color:var(--text-dim);flex-shrink:0;transition:background .2s,color .2s;margin-top:1px}
.scenario.open .sc-num{background:var(--accent);color:#fff}

.sc-info{flex:1;min-width:0}
.sc-title{font-family:'Bricolage Grotesque',sans-serif;font-size:.95rem;font-weight:700;
  color:var(--text);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-sub{font-size:.78rem;color:var(--text-muted);margin-top:3px;line-height:1.45;white-space:normal}

.sc-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-top:2px}
.sc-prog{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sc-prog-label{font-size:.72rem;color:var(--text-dim);font-variant-numeric:tabular-nums;white-space:nowrap}
.sc-prog-bar{width:56px;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;flex-shrink:0}
.sc-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#38AEFF);
  transition:width .35s ease}
.sc-prog-fill.all-done{background:linear-gradient(90deg,var(--green),#22C888)}



.chevron{color:var(--text-dim);transition:transform .22s ease;flex-shrink:0}
.scenario.open .chevron{transform:rotate(180deg)}

/* ─── BODY ─── */
.sc-body{display:none;border-top:1px solid var(--border)}
.scenario.open .sc-body{display:block}

/* ─── STEP ─── */
.step{border-bottom:1px solid var(--border);transition:background .1s}
.step:last-child{border-bottom:none}
.step:hover{background:var(--card-hover)}

/* LINK STEP */
.step-link{display:flex;align-items:center;gap:12px;padding:11px 18px}
.step-link-cb{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.step-link-title{flex:1;font-size:.87rem;font-weight:500;color:var(--text)}
.step-link-url{font-size:.72rem;color:var(--text-dim);font-family:monospace;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;display:none}
.step-link:hover .step-link-url{display:block}
.open-link-btn{background:none;border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:600;
  padding:5px 12px;cursor:pointer;transition:border-color .14s,color .14s,background .14s;white-space:nowrap}
.open-link-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.open-link-btn.visited{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* SETTINGS GROUP STEP */
.step-sg{padding:0}
.sg-head{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;
  transition:background .1s;user-select:none}
.sg-head:hover{background:var(--surface)}
.sg-icon{width:18px;height:18px;border-radius:4px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.step-sg.sg-open .sg-icon{background:var(--accent-light)}
.sg-title{flex:1;font-size:.87rem;font-weight:600;color:var(--text)}
.sg-source{font-size:.7rem;color:var(--text-dim);font-family:monospace}
.sg-chev{color:var(--text-dim);transition:transform .2s ease;flex-shrink:0}
.step-sg.sg-open .sg-chev{transform:rotate(180deg)}
.sg-body{display:none;border-top:1px solid var(--border)}
.step-sg.sg-open .sg-body{display:block}

/* SETTING ROW */
.setting-row{display:flex;align-items:flex-start;gap:12px;padding:10px 18px 10px 36px;
  border-bottom:1px solid var(--border);transition:background .1s}
.setting-row:last-child{border-bottom:none}
.setting-row:hover{background:var(--card-hover)}
.setting-row.hidden{display:none}
.setting-label{flex:1;min-width:0}
.setting-title{font-size:.84rem;font-weight:500;color:var(--text);line-height:1.4}
.setting-name{font-size:.7rem;color:var(--text-dim);font-family:monospace;margin-top:1px;letter-spacing:.02em}
.setting-note{font-size:.72rem;color:var(--text-dim);margin-top:3px;font-style:italic}
.setting-ctrl{flex-shrink:0;display:flex;align-items:center;min-width:140px;justify-content:flex-end}

/* TOGGLE */
.tog{position:relative;display:inline-flex;align-items:center;cursor:pointer}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{width:36px;height:20px;background:var(--surface2);border:1px solid var(--border);
  border-radius:99px;transition:background .2s,border-color .2s;flex-shrink:0}
.tog input:checked~.tog-track{background:var(--accent);border-color:var(--accent)}
.tog-thumb{position:absolute;left:3px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tog-thumb{left:19px}

/* SELECT */
.ctrl-sel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;
  padding:6px 10px;outline:none;cursor:pointer;transition:border-color .16s,box-shadow .16s;
  max-width:190px}
.ctrl-sel:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-mid)}

/* TEXT / TEXTAREA */
.ctrl-txt{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;
  padding:6px 10px;outline:none;transition:border-color .16s,box-shadow .16s;width:200px}
.ctrl-txt:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-mid)}
.ctrl-ta{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;
  padding:6px 10px;outline:none;transition:border-color .16s,box-shadow .16s;
  width:200px;resize:vertical;min-height:56px}
.ctrl-ta:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-mid)}

/* READONLY */
.ctrl-ro{text-align:right}
.ctrl-ro-val{font-size:.82rem;color:var(--text-muted)}
.ctrl-ro-badge{display:inline-block;font-size:.66rem;font-weight:600;background:var(--surface);
  border:1px solid var(--border);color:var(--text-dim);border-radius:99px;
  padding:1px 7px;margin-top:3px;letter-spacing:.04em;text-transform:uppercase}

/* COND BADGE */
.cond-badge{font-size:.67rem;font-weight:600;padding:2px 7px;border-radius:99px;
  background:var(--amber-bg);color:var(--amber);border:1px solid rgba(180,83,9,.18);
  margin-left:5px;letter-spacing:.03em;white-space:nowrap;flex-shrink:0}

/* MATRIX STEP */
.step-matrix{padding:0}
.matrix-head{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;
  user-select:none;transition:background .1s}
.matrix-head:hover{background:var(--surface)}
.matrix-title{flex:1;font-size:.87rem;font-weight:600;color:var(--text)}
.matrix-open-btn{background:var(--accent-light);border:1px solid rgba(0,117,255,.3);border-radius:var(--r-xs);
  color:var(--accent);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:600;
  padding:5px 13px;cursor:pointer;transition:background .14s,border-color .14s}
.matrix-open-btn:hover{background:var(--accent);color:#fff}

/* GROUP STEP */
.step-group{padding:0}
.group-head{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;
  user-select:none;transition:background .1s}
.group-head:hover{background:var(--surface)}
.group-title{flex:1;font-size:.87rem;font-weight:600;color:var(--text)}
.group-body{display:none;border-top:1px solid var(--border)}
.step-group.g-open .group-body{display:block}
.g-chev{color:var(--text-dim);transition:transform .2s;flex-shrink:0}
.step-group.g-open .g-chev{transform:rotate(180deg)}
.group-item{display:flex;align-items:center;gap:12px;padding:9px 18px 9px 30px;
  border-bottom:1px solid var(--border);transition:background .1s}
.group-item:last-child{border-bottom:none}
.group-item:hover{background:var(--card-hover)}
.group-item-cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.group-item-title{flex:1;font-size:.84rem;font-weight:500;color:var(--text)}
.group-item-btn{background:none;border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.73rem;font-weight:600;
  padding:4px 10px;cursor:pointer;transition:border-color .14s,color .14s,background .14s}
.group-item-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(13,17,23,.35);backdrop-filter:blur(4px);
  z-index:500;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  width:500px;max-width:calc(100vw - 32px);max-height:82vh;display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);transform:translateY(10px);transition:transform .22s ease;overflow:hidden}
.overlay.show .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Bricolage Grotesque',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
.modal-x{background:none;border:1px solid var(--border);border-radius:var(--r-xs);
  color:var(--text-muted);cursor:pointer;font-size:.85rem;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.modal-x:hover{background:var(--surface);color:var(--text)}
.modal-body{overflow-y:auto;flex:1;padding:6px 0}
.modal-row{display:flex;align-items:center;gap:12px;padding:10px 20px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.modal-row:last-child{border-bottom:none}
.modal-row:hover{background:var(--surface)}
.modal-cb{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.modal-label{font-size:.84rem;font-weight:500;color:var(--text);flex:1}
.modal-key{font-size:.68rem;font-family:monospace;color:var(--text-dim)}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;flex-shrink:0}
.modal-done-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;
  padding:8px 24px;cursor:pointer;transition:background .14s}
.modal-done-btn:hover{background:var(--accent-hover)}

/* ─── TOAST ─── */
.toasts{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--r-sm);padding:11px 15px;min-width:240px;max-width:320px;pointer-events:all;
  box-shadow:var(--shadow-md);animation:tIn .22s ease forwards}
.toast.out{animation:tOut .22s ease forwards}
.toast-title{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:2px}
.toast-url{font-size:.72rem;color:var(--text-dim);font-family:monospace;word-break:break-all}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}

/* ─── SCROLL ─── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
</style>
</head>
<body>

<div class="toasts" id="toasts"></div>

<div class="overlay" id="matrixOverlay">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="matrixModalTitle">Матрица</span>
      <button class="modal-x" id="matrixClose">✕</button>
    </div>
    <div class="modal-body" id="matrixModalBody"></div>
    <div class="modal-ft"><button class="modal-done-btn" id="matrixDone">Готово</button></div>
  </div>
</div>

<div class="shell">
  <div class="page-hd">
    <h1 class="page-title">Сценарии настройки CRM</h1>
    <p class="page-sub">Пошаговая настройка системы — воронки, поля, автоматизация, интеграции и контроль.</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-inp" id="searchInp" type="text" placeholder="Поиск по названию или шагам…">
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="all">Все</button>
      <button class="tab" data-tab="lead">Лиды</button>
      <button class="tab" data-tab="deal">Сделки</button>
      <button class="tab" data-tab="contact">Контакты</button>
      <button class="tab" data-tab="company">Компании</button>
      <button class="tab" data-tab="invoice">Счета</button>
      <button class="tab" data-tab="quote">Предложения</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="list" id="list"></div>
  <div class="empty" id="emptyMsg" style="display:none">Ничего не найдено</div>
</div>

// step states: { [scId_stepId]: 'not_started' | 'in_progress' | 'done' }
// setting values: { [settingName]: value }
// matrix values: { [name]: bool }
let stepStates = {};
let settingValues = {};
let openScenarios = new Set();
let activeTab = 'all';
let searchQuery = '';

const ENTITY_PREFIXES = {
  lead:    ['LEAD_'],
  deal:    ['DEAL_'],
  contact: ['CONTACT_'],
  company: ['COMPANY_'],
  invoice: ['INVOICE_'],
  quote:   ['QUOTE_'],
};

function matchesEntity(name, entity){
  if(!name || entity === 'all') return true;
  return ENTITY_PREFIXES[entity].some(p => name.toUpperCase().includes(p));
}

function stepMatchesEntity(step, entity){
  if(entity === 'all') return true;
  if(step.type === 'settings_group' && step.settings)
    return step.settings.some(s => matchesEntity(s.name, entity));
  if(step.type === 'matrix' && step.items)
    return step.items.some(s => matchesEntity(s.name, entity));
  if(step.type === 'group' && step.items)
    return step.items.some(i => matchesEntity(i.setting || i.name || '', entity));
  if(step.type === 'link')
    return matchesEntity(step.href || step.title || '', entity);
  return false;
}

function scenarioMatchesEntity(sc, entity){
  if(entity === 'all') return true;
  return sc.steps.some(step => stepMatchesEntity(step, entity));
}

function lsKey(k){ return 'crm_setup_' + k; }
function lsGet(k){ try{ const v = localStorage.getItem(lsKey(k)); return v === null ? undefined : JSON.parse(v); } catch{ return undefined; } }
function lsSet(k, v){ try{ localStorage.setItem(lsKey(k), JSON.stringify(v)); } catch{} }

function initState(){
  DATA.scenarios.forEach(sc => {
    sc.steps.forEach(step => {
      const key = sc.id + '__' + step.id;
      const saved = lsGet('step_' + key);
      stepStates[key] = saved || 'not_started';

      if(step.type === 'settings_group' && step.settings){
        step.settings.forEach(s => {
          if(settingValues[s.name] === undefined){
            const sv = lsGet('setting_' + s.name);
            settingValues[s.name] = sv !== undefined ? sv : (s.type === 'toggle' ? false : (s.options ? s.options[0].value : ''));
          }
        });
      }
      if(step.type === 'matrix' && step.items){
        step.items.forEach(item => {
          if(settingValues[item.name] === undefined){
            const sv = lsGet('setting_' + item.name);
            settingValues[item.name] = sv !== undefined ? sv : false;
          }
        });
      }
    });
  });
}

function setStepState(scId, stepId, state){
  const key = scId + '__' + stepId;
  stepStates[key] = state;
  lsSet('step_' + key, state);
}

function getStepState(scId, stepId){
  return stepStates[scId + '__' + stepId] || 'not_started';
}

function setSettingValue(name, val){
  settingValues[name] = val;
  lsSet('setting_' + name, val);
}

function getSettingValue(name){ return settingValues[name]; }

function checkVisibility(vis){
  if(!vis || !vis.when) return true;
  return vis.when.every(cond => {
    const cur = getSettingValue(cond.settingId);
    if(cond.operator === 'equals'){
      if(typeof cond.value === 'boolean') return cur === cond.value;
      return String(cur) === String(cond.value);
    }
    return true;
  });
}

/* ─── SCENARIO STATUS ─── */
function getScenarioStatus(sc){
  const states = sc.steps.map(st => getStepState(sc.id, st.id));
  if(states.every(s => s === 'done')) return 'done';
  if(states.some(s => s === 'done' || s === 'in_progress')) return 'in_progress';
  return 'not_started';
}

function countableSteps(sc){ return sc.steps.length; }
function doneSteps(sc){ return sc.steps.filter(st => getStepState(sc.id, st.id) === 'done').length; }

/* ─── SEARCH MATCH ─── */
function stepMatchesSearch(step, q){
  if(!q) return true;
  const low = q.toLowerCase();
  if(step.title && step.title.toLowerCase().includes(low)) return true;
  if(step.type === 'settings_group' && step.settings){
    return step.settings.some(s => s.title.toLowerCase().includes(low) || s.name.toLowerCase().includes(low));
  }
  if(step.type === 'group' && step.items){
    return step.items.some(i => i.title.toLowerCase().includes(low));
  }
  if(step.type === 'matrix' && step.items){
    return step.items.some(i => i.title.toLowerCase().includes(low) || i.name.toLowerCase().includes(low));
  }
  return false;
}

function scenarioMatchesSearch(sc, q){
  if(!q) return true;
  if(sc.title.toLowerCase().includes(q.toLowerCase())) return true;
  return sc.steps.some(st => stepMatchesSearch(st, q));
}

/* ─── TOAST ─── */
function showToast(title, url){
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-title">${esc(title)}</div>${url ? `<div class="toast-url">${esc(url)}</div>` : ''}`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 230); }, 3000);
}

/* ─── UTILS ─── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function svgChev(cls){ return `<svg class="${cls}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`; }
function svgLink(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`; }
function svgGear(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`; }

/* ─── BUILD CONTROLS ─── */
function buildToggle(name, scId, stepId, onChange){
  const label = document.createElement('label');
  label.className = 'tog';
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.checked = !!getSettingValue(name);
  const track = document.createElement('span'); track.className = 'tog-track';
  const thumb = document.createElement('span'); thumb.className = 'tog-thumb';
  inp.addEventListener('change', () => {
    setSettingValue(name, inp.checked);
    if(scId && stepId) setStepState(scId, stepId, 'in_progress');
    if(onChange) onChange();
  });
  label.append(inp, track, thumb);
  return label;
}

function buildSelect(name, opts, scId, stepId, onChange){
  const sel = document.createElement('select');
  sel.className = 'ctrl-sel';
  opts.forEach(o => { const op = document.createElement('option'); op.value = o.value; op.textContent = o.label; sel.append(op); });
  const cur = getSettingValue(name);
  if(cur !== undefined && cur !== false) sel.value = String(cur);
  sel.addEventListener('change', () => {
    setSettingValue(name, sel.value);
    if(scId && stepId) setStepState(scId, stepId, 'in_progress');
    if(onChange) onChange();
  });
  return sel;
}

function buildText(name, scId, stepId){
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'ctrl-txt';
  const v = getSettingValue(name); inp.value = (v && v !== false) ? v : '';
  inp.addEventListener('input', () => { setSettingValue(name, inp.value); if(scId && stepId) setStepState(scId, stepId, 'in_progress'); });
  return inp;
}

function buildTextarea(name, scId, stepId){
  const ta = document.createElement('textarea');
  ta.className = 'ctrl-ta';
  const v = getSettingValue(name); ta.value = (v && v !== false) ? v : '';
  ta.addEventListener('input', () => { setSettingValue(name, ta.value); if(scId && stepId) setStepState(scId, stepId, 'in_progress'); });
  return ta;
}

/* ─── BUILD STEPS ─── */
function buildLinkStep(step, sc){
  const state = getStepState(sc.id, step.id);
  const div = document.createElement('div');
  div.className = 'step';

  const row = document.createElement('div');
  row.className = 'step-link';

  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'step-link-cb';
  cb.checked = state === 'done';
  cb.addEventListener('change', e => {
    e.stopPropagation();
    setStepState(sc.id, step.id, cb.checked ? 'done' : 'not_started');
    renderAll();
  });

  const title = document.createElement('span');
  title.className = 'step-link-title';
  title.textContent = step.title;

  const urlSpan = document.createElement('span');
  urlSpan.className = 'step-link-url'; urlSpan.textContent = step.href || '';

  const btn = document.createElement('button');
  btn.className = 'open-link-btn' + (state === 'in_progress' || state === 'done' ? ' visited' : '');
  btn.innerHTML = svgLink() + ' Открыть';
  btn.style.display = 'flex'; btn.style.alignItems = 'center'; btn.style.gap = '5px';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if(state !== 'done') setStepState(sc.id, step.id, 'in_progress');
    showToast(step.title, step.href);
    renderAll();
  });

  row.append(cb, title, urlSpan, btn);
  div.append(row);
  return div;
}

function buildSettingsGroupStep(step, sc){
  const div = document.createElement('div');
  div.className = 'step step-sg';

  const head = document.createElement('div');
  head.className = 'sg-head';

  const icon = document.createElement('div');
  icon.className = 'sg-icon';
  icon.innerHTML = svgGear();

  const titleEl = document.createElement('span'); titleEl.className = 'sg-title'; titleEl.textContent = step.title;
  const src = step.source ? document.createElement('span') : null;
  if(src){ src.className = 'sg-source'; src.textContent = step.source.tab || ''; }

  head.append(icon, titleEl);
  if(src) head.append(src);
  head.append(svgChevEl('sg-chev'));

  const body = document.createElement('div');
  body.className = 'sg-body';

  const refreshVisibility = () => {
    body.querySelectorAll('.setting-row[data-vis]').forEach(row => {
      const vis = JSON.parse(row.dataset.vis);
      row.classList.toggle('hidden', !checkVisibility(vis));
    });
  };

  const settingsToRender = activeTab === 'all'
    ? step.settings
    : step.settings.filter(s => matchesEntity(s.name, activeTab));

  if(settingsToRender.length === 0) return null;

  settingsToRender.forEach(setting => {
    const row = document.createElement('div');
    row.className = 'setting-row' + (setting.visibility && !checkVisibility(setting.visibility) ? ' hidden' : '');
    if(setting.visibility) row.dataset.vis = JSON.stringify(setting.visibility);

    const labelWrap = document.createElement('div'); labelWrap.className = 'setting-label';
    const titleRow = document.createElement('div'); titleRow.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:4px';
    const t = document.createElement('span'); t.className = 'setting-title'; t.textContent = setting.title;
    titleRow.append(t);
    if(setting.visibility){
      const cb = document.createElement('span'); cb.className = 'cond-badge';
      const c = setting.visibility.when[0];
      cb.textContent = 'if ' + c.settingId + '=' + (c.value === true ? 'on' : c.value === false ? 'off' : c.value);
      titleRow.append(cb);
    }
    const nameEl = document.createElement('div'); nameEl.className = 'setting-name'; nameEl.textContent = setting.name;
    labelWrap.append(titleRow, nameEl);
    if(setting.note){ const n = document.createElement('div'); n.className = 'setting-note'; n.textContent = setting.note; labelWrap.append(n); }

    const ctrl = document.createElement('div'); ctrl.className = 'setting-ctrl';

    if(setting.type === 'toggle'){
      ctrl.append(buildToggle(setting.name, sc.id, step.id, refreshVisibility));
    } else if(setting.type === 'select'){
      ctrl.append(buildSelect(setting.name, setting.options, sc.id, step.id, refreshVisibility));
    } else if(setting.type === 'text'){
      ctrl.append(buildText(setting.name, sc.id, step.id));
    } else if(setting.type === 'textarea'){
      ctrl.append(buildTextarea(setting.name, sc.id, step.id));
    } else if(setting.type === 'readonly'){
      const ro = document.createElement('div'); ro.className = 'ctrl-ro';
      const val = document.createElement('div'); val.className = 'ctrl-ro-val'; val.textContent = '—';
      const badge = document.createElement('div'); badge.className = 'ctrl-ro-badge'; badge.textContent = 'read-only';
      ro.append(val, badge);
      ctrl.append(ro);
    }

    row.append(labelWrap, ctrl);
    body.append(row);
  });

  head.addEventListener('click', () => {
    div.classList.toggle('sg-open');
    refreshVisibility();
  });

  if(activeTab !== 'all'){ div.classList.add('sg-open'); refreshVisibility(); }

  div.append(head, body);
  return div;
}

function buildMatrixStep(step, sc){
  const div = document.createElement('div');
  div.className = 'step step-matrix';

  const head = document.createElement('div');
  head.className = 'matrix-head';

  const title = document.createElement('span'); title.className = 'matrix-title'; title.textContent = step.title;
  const btn = document.createElement('button'); btn.className = 'matrix-open-btn'; btn.textContent = 'Открыть матрицу';

  btn.addEventListener('click', e => {
    e.stopPropagation();
    openMatrix(step, sc);
  });

  head.append(title, btn);
  div.append(head);
  return div;
}

function buildGroupStep(step, sc){
  const div = document.createElement('div');
  div.className = 'step step-group';

  const head = document.createElement('div');
  head.className = 'group-head';
  const title = document.createElement('span'); title.className = 'group-title'; title.textContent = step.title;
  head.append(title, svgChevEl('g-chev'));

  const body = document.createElement('div');
  body.className = 'group-body';

  const groupItemsToRender = activeTab === 'all'
    ? step.items
    : step.items.filter(i => matchesEntity(i.setting || i.name || i.href || '', activeTab));

  if(groupItemsToRender.length === 0) return null;

  groupItemsToRender.forEach(item => {
    const row = document.createElement('div'); row.className = 'group-item';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.className='group-item-cb';
    const saved = lsGet('gi_' + item.id); cb.checked = !!saved;
    const t = document.createElement('span'); t.className = 'group-item-title'; t.textContent = item.title;
    cb.addEventListener('change', e => {
      e.stopPropagation();
      lsSet('gi_' + item.id, cb.checked);
      setStepState(sc.id, step.id, cb.checked ? 'in_progress' : 'not_started');
      renderAll();
    });
    const btn = document.createElement('button'); btn.className = 'group-item-btn';
    btn.innerHTML = svgLink() + ' Открыть';
    btn.style.cssText = 'display:flex;align-items:center;gap:5px';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setStepState(sc.id, step.id, 'in_progress');
      showToast(item.title, item.href);
      renderAll();
    });
    row.append(cb, t, btn);
    body.append(row);
  });

  head.addEventListener('click', () => div.classList.toggle('g-open'));
  if(activeTab !== 'all') div.classList.add('g-open');
  div.append(head, body);
  return div;
}

function svgChevEl(cls){
  const el = document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.setAttribute('width','14'); el.setAttribute('height','14'); el.setAttribute('viewBox','0 0 24 24');
  el.setAttribute('fill','none'); el.setAttribute('stroke','currentColor');
  el.setAttribute('stroke-width','2.2'); el.setAttribute('stroke-linecap','round'); el.setAttribute('stroke-linejoin','round');
  el.setAttribute('class', cls);
  const p = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  p.setAttribute('points','6 9 12 15 18 9'); el.append(p);
  return el;
}

/* ─── MATRIX MODAL ─── */
function openMatrix(step, sc){
  const overlay = document.getElementById('matrixOverlay');
  document.getElementById('matrixModalTitle').textContent = step.title;
  const body = document.getElementById('matrixModalBody');
  body.innerHTML = '';

  step.items.forEach(item => {
    const row = document.createElement('div'); row.className = 'modal-row';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.className='modal-cb';
    cb.checked = !!getSettingValue(item.name);
    cb.addEventListener('change', e => { e.stopPropagation(); setSettingValue(item.name, cb.checked); setStepState(sc.id, step.id, 'in_progress'); });
    const lbl = document.createElement('span'); lbl.className = 'modal-label'; lbl.textContent = item.title;
    const key = document.createElement('span'); key.className = 'modal-key'; key.textContent = item.name;
    row.addEventListener('click', e => { if(e.target !== cb){ cb.checked = !cb.checked; setSettingValue(item.name, cb.checked); setStepState(sc.id, step.id, 'in_progress'); }});
    row.append(cb, lbl, key);
    body.append(row);
  });

  overlay.classList.add('show');
}

document.getElementById('matrixClose').addEventListener('click', () => document.getElementById('matrixOverlay').classList.remove('show'));
document.getElementById('matrixDone').addEventListener('click', () => { document.getElementById('matrixOverlay').classList.remove('show'); renderAll(); });
document.getElementById('matrixOverlay').addEventListener('click', e => { if(e.target === e.currentTarget) e.currentTarget.classList.remove('show'); });

/* ─── RENDER ─── */
function renderStats(){
  const row = document.getElementById('statsRow');
  let dn=0;
  DATA.scenarios.forEach(sc => { if(getScenarioStatus(sc)==='done') dn++; });
  row.innerHTML = `<span class="stat-chip done">Завершено: ${dn} из ${DATA.scenarios.length}</span>`;
}

function renderAll(){
  renderStats();
  const list = document.getElementById('list');
  const empty = document.getElementById('emptyMsg');
  list.innerHTML = '';
  let anyVisible = false;
  const q = searchQuery.toLowerCase().trim();

  DATA.scenarios.forEach((sc, idx) => {
    if(!scenarioMatchesEntity(sc, activeTab)) return;
    if(q && !scenarioMatchesSearch(sc, q)) return;
    anyVisible = true;

    const done = doneSteps(sc);
    const total = countableSteps(sc);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const allDone = done === total && total > 0;
    const isOpen = openScenarios.has(sc.id);

    const card = document.createElement('div');
    card.className = 'scenario' + (isOpen ? ' open' : '');

    /* HEAD */
    const head = document.createElement('div'); head.className = 'sc-head';

    const num = document.createElement('div'); num.className = 'sc-num'; num.textContent = String(idx+1).padStart(2,'0');

    const info = document.createElement('div'); info.className = 'sc-info';
    const titleEl = document.createElement('div'); titleEl.className = 'sc-title'; titleEl.textContent = sc.title;
    const subEl = document.createElement('div'); subEl.className = 'sc-sub'; subEl.textContent = sc.subtitle||'';
    info.append(titleEl, subEl);

    const right = document.createElement('div'); right.className = 'sc-right';

    const prog = document.createElement('div'); prog.className = 'sc-prog';
    const progLbl = document.createElement('div'); progLbl.className = 'sc-prog-label'; progLbl.textContent = `${done}/${total}`;
    const progBar = document.createElement('div'); progBar.className = 'sc-prog-bar';
    const progFill = document.createElement('div');
    progFill.className = 'sc-prog-fill' + (allDone ? ' all-done' : '');
    progFill.style.width = pct + '%';
    progBar.append(progFill); prog.append(progLbl, progBar);

    right.append(prog, svgChevEl('chevron'));
    head.append(num, info, right);
    head.addEventListener('click', () => {
      if(openScenarios.has(sc.id)) openScenarios.delete(sc.id);
      else openScenarios.add(sc.id);
      renderAll();
    });

    /* BODY */
    const body = document.createElement('div'); body.className = 'sc-body';
    sc.steps.forEach(step => {
      if(q && !stepMatchesSearch(step, q)) return;
      if(activeTab !== 'all' && !stepMatchesEntity(step, activeTab)) return;
      let el;
      if(step.type === 'link') el = buildLinkStep(step, sc);
      else if(step.type === 'settings_group') el = buildSettingsGroupStep(step, sc);
      else if(step.type === 'matrix') el = buildMatrixStep(step, sc);
      else if(step.type === 'group') el = buildGroupStep(step, sc);
      if(el) body.append(el);
    });

    if(body.children.length === 0) return;

    card.append(head, body);
    list.append(card);
  });

  empty.style.display = anyVisible ? 'none' : '';
}

/* ─── EVENTS ─── */
document.getElementById('searchInp').addEventListener('input', e => { searchQuery = e.target.value; renderAll(); });
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    if(activeTab === 'all'){
      openScenarios.clear();
    } else {
      DATA.scenarios.forEach(sc => {
        if(scenarioMatchesEntity(sc, activeTab)) openScenarios.add(sc.id);
      });
    }
    renderAll();
  });
});

initState();
renderAll();
</script>
